upstream docuclas {
    server servidor1-docuclas.onrender.com:443;
    server servidor2-docuclas-1.onrender.com:443;
    server servidor3-docuclas.onrender.com:443;
}

server {
    listen 80;

    # Responder preflight OPTIONS directamente
    if ($request_method = OPTIONS) {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'keep-alive,user-agent,cache-control,content-type,content-transfer-encoding,x-accept-content-transfer-encoding,x-accept-response-streaming,x-user-agent,x-grpc-web,grpc-timeout,authorization,x-requested-with' always;
        add_header 'Access-Control-Expose-Headers' 'grpc-status,grpc-message,grpc-encoding,grpc-accept-encoding' always;
        add_header 'Access-Control-Max-Age' '1728000' always;
        add_header 'Content-Type' 'text/plain' always;
        add_header 'Content-Length' '0' always;
        return 204;
    }

    location / {
        proxy_pass https://docuclas;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'keep-alive,user-agent,cache-control,content-type,content-transfer-encoding,x-accept-content-transfer-encoding,x-accept-response-streaming,x-user-agent,x-grpc-web,grpc-timeout,authorization,x-requested-with' always;
        add_header 'Access-Control-Expose-Headers' 'grpc-status,grpc-message,grpc-encoding,grpc-accept-encoding' always;
    }
}